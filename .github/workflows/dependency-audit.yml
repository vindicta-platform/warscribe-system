name: Dependency Audit

on:
  schedule:
    - cron: '0 6 * * 1'
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

jobs:
  audit:
    uses: vindicta-platform/.github/.github/workflows/dependency-audit-template.yml@main
    permissions:
      contents: read
      pull-requests: write
